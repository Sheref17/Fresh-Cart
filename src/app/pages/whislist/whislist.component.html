

<section class="bg-gray-50 rounded border shadow p-4 w-[75%] mx-auto">
    <h1 class="text-center text-3xl text-green-600">Whish List</h1>
    @for (prod of whishDetails; track prod.id  ) {

     
      <div class="flex items-center justify-between">
        <div class="grid md:grid-cols-[50%_minmax(0,1fr)] border-b mb-2 pb-2">
          <div>
            <img [src]="prod.imageCover" class="w-full h-[100px] object-contain" [alt]="prod.title">
          </div>
  
          <div class="flex justify-between items-center w-full">
            <div>
              <h3 class="text-lg font-medium">{{prod.title.split(" ",2).join(" ")  }}</h3>
              <h4 class="text-gray-600">Price: {{prod.price | currency}}</h4>
              <button (click)="removeItem(prod.id)" class="text-red-600 hover:text-red-700 transition">
                <i class="fas fa-trash-can"></i> Remove
              </button>
            </div>
  
        
          </div>
        </div>
        <div>
          <button  (click)="addToCart(prod.id)" class="btn-main" > add to cart </button>
        </div>
      </div>


    }
</section>
